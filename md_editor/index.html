<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ViewEditor</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="./lib/marked.min.js"></script>
  <script src="./lib/lucide.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">ScholarNotebook</div>
        <h1>ViewEditor</h1>
        <p>마크다운 원문을 편집하고 렌더링 결과를 함께 보는 보기에디터</p>
      </div>
      <div class="topbar-actions">
        <button class="ghost icon-btn" id="btnToggleSidebar" title="왼쪽 사이드바 숨기기/보이기" aria-label="왼쪽 사이드바 숨기기/보이기">☰</button>
        <button class="ghost icon-btn" id="btnToggleToolbar" title="편집 메뉴 숨기기/보이기" aria-label="편집 메뉴 숨기기/보이기">⌘</button>
        <button class="ghost" id="btnTogglePreview">미리보기</button>
        <button class="ghost" id="btnNewFile">새파일</button>
        <button class="ghost" id="btnNewFolder">새폴더</button>
        <button class="ghost" id="btnMergeSelected">선택병합</button>
        <button class="ghost" id="btnBackupMpv">MVP백업</button>
        <button class="ghost" id="btnImportMpv">MVP불러오기</button>
        <button class="ghost icon-btn" id="btnTextSmaller" title="텍스트 축소" aria-label="텍스트 축소">A-</button>
        <button class="ghost icon-btn" id="btnTextLarger" title="텍스트 확대" aria-label="텍스트 확대">A+</button>
        <button class="primary" id="btnSave">내부저장</button>
        <button class="ghost" id="btnSaveMd">MD파일저장</button>
        <input type="file" id="fileImportMpv" accept=".mpv,.mvp,.json" hidden />
      </div>
    </header>

    <section class="toolbar" id="editorToolbar" aria-label="마크다운 편집 도구">
      <button data-action="bold"><strong>B</strong></button>
      <button data-action="italic"><em>I</em></button>
      <button data-action="h1">H1</button>
      <button data-action="h2">H2</button>
      <button data-action="h3">H3</button>
      <button data-action="olist">1.</button>
      <button data-action="ulist">-</button>
      <button data-action="quote">&quot;</button>
      <button data-action="table">표</button>
      <button data-action="link">링크</button>
      <button data-action="image">이미지</button>
      <button data-action="br">BR</button>
      <button data-action="userinfo">userIn</button>
      <button data-action="userSettings">설정</button>
    </section>

    <main class="workspace">
      <aside class="panel sidebar-panel">
        <div class="sidebar-tabs">
          <button type="button" class="tab-btn active" id="btnTabFiles">파일</button>
          <button type="button" class="tab-btn" id="btnTabToc">목차</button>
        </div>
        <div class="sidebar-body" id="sidebarFiles">
          <div class="sidebar-caption" id="activeFolderLabel">현재 폴더: 루트</div>
          <div id="fileTree" class="tree-list"></div>
        </div>
        <div class="sidebar-body hidden" id="sidebarToc">
          <div class="sidebar-caption">현재 문서 목차</div>
          <div id="tocList" class="tree-list"></div>
        </div>
      </aside>
      <section class="panel editor-panel">
        <div class="panel-title">편집</div>
        <textarea id="editor" spellcheck="false" placeholder="여기에 마크다운을 입력하세요..."></textarea>
      </section>
      <section class="panel preview-panel" id="previewPanel">
        <div class="panel-title">보기</div>
        <article id="preview" class="preview"></article>
        <div class="preview-footer">
          <button id="btnRenderBottom" class="primary">마크다운 렌더링 보기</button>
        </div>
      </section>
    </main>
  </div>

  <div class="profile-modal hidden" id="profileModal">
    <div class="profile-modal-card">
      <h3>사용자 정보 설정</h3>
      <label>이름 <input type="text" id="profileName" /></label>
      <label>소속 <input type="text" id="profileOrg" /></label>
      <label>연락처 <input type="text" id="profileContact" /></label>
      <label>메일 <input type="email" id="profileEmail" /></label>
      <div class="profile-modal-actions">
        <button type="button" class="ghost" id="btnProfileCancel">취소</button>
        <button type="button" class="primary" id="btnProfileSave">저장</button>
      </div>
    </div>
  </div>

  <script src="./vieweditor-paste.js"></script>
  <script src="./app.js"></script>
</body>
</html>
