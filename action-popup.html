<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>동작 도구</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 300px;
      padding: 12px 14px 14px;
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      font-size: 12px;
      color: #e2e8f0;
      background: #0f172a;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      color: #f8fafc;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      min-height: 22px;
    }
    .row label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #3b82f6;
      flex-shrink: 0;
    }
    .btn-open {
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #475569;
      border-radius: 6px;
      background: #334155;
      color: #e2e8f0;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-open:hover:not(:disabled) {
      background: #475569;
    }
    .btn-open:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .hint {
      margin: 2px 0 10px 22px;
      font-size: 10px;
      color: #64748b;
      line-height: 1.35;
    }
    .divider {
      height: 1px;
      background: #334155;
      margin: 10px 0 8px;
    }
  </style>
</head>
<body>
  <h1>앱 켜기 / 끄기</h1>

  <div class="row">
    <label>
      <input type="checkbox" id="chkGeneralPrompt" />
      <span>General Prompt</span>
    </label>
    <button type="button" class="btn-open" id="btnOpenPrompts" title="프롬프트 관리 창 열기">열기</button>
  </div>
  <p class="hint">Edge 어디서나 프롬프트만 별도 창으로 사용</p>

  <div class="divider"></div>

  <div class="row">
    <label>
      <input type="checkbox" id="chkScholarNotebookLM" />
      <span>Scholar NotebookLM</span>
    </label>
    <button type="button" class="btn-open" id="btnToggleSidebar" title="NotebookLM 패널">패널</button>
  </div>
  <p class="hint">NotebookLM 페이지에 패널-헤더 버튼 표시 (교면 UI 제거)</p>

  <div class="divider"></div>

  <div class="row">
    <label>
      <input type="checkbox" id="chkMDEditor" />
      <span>MD editor</span>
    </label>
    <button type="button" class="btn-open" id="btnOpenMD" title="Markdown Pro Viewer">열기</button>
  </div>
  <p class="hint">mdproviewer.vercel.app 새 탭</p>

  <div class="row">
    <label>
      <input type="checkbox" id="chkPdf2pptMake" />
      <span>pdf2ppt Make</span>
    </label>
    <button type="button" class="btn-open" id="btnOpenPdf2pptMake" title="pdf2ppt Make">열기</button>
  </div>
  <p class="hint">pdf2pptmake.onrender.com 새 탭</p>

  <script src="action-popup.js"></script>
</body>
</html>
