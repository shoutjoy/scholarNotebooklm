<div id="settings-modal" class="modal-overlay">
    <div class="modal" style="width:360px">
        <div class="modal-header">
            <h3>환경설정</h3>
            <button class="btn-close" data-action="closeModal" data-arg="settings-modal">닫기</button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
            <div class="section-title blue">ToMD Setting</div>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
                    <input type="radio" name="tomdOpenType" value="internal">
                    <span>ToMD 내부열기 (확장 프로그램 내장 뷰어)</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
                    <input type="radio" name="tomdOpenType" value="external" checked>
                    <span>ToMD 외부열기 (https://mdproviewer.vercel.app/)</span>
                </label>
            </div>
            <div class="section-title blue">스크랩 응답 형식</div>
            <div style="display:flex; flex-direction:column; gap:8px;">
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
                    <input type="radio" name="scrapResponseFormat" value="conversation">
                    <span>대화형 (User / Assistant)</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
                    <input type="radio" name="scrapResponseFormat" value="answer_only" checked>
                    <span>답변만</span>
                </label>
            </div>
            <div class="section-title blue">화면 설정</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;align-items:start;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
                    <input type="checkbox" id="chkHideConversationSave" checked>
                    <span>대화저장 감추기</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
                    <input type="checkbox" id="chkHideScholarSlideStudio" checked>
                    <span>Scholar Slide 숨기기</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
                    <input type="checkbox" id="chkHideMDEditorHeader" checked>
                    <span>MD editor 숨기기 (NotebookLM 헤더)</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;">
                    <input type="checkbox" id="chkHideMDProViewerStudio" checked>
                    <span>MDproViewer 숨기기</span>
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-download" data-action="saveSettings" style="background:#16a34a;color:#fff">저장</button>
        </div>
    </div>
</div>
