<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NotebookLM- Scholar Assistant</title>
  <script src="./lib/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: "Segoe UI", "Malgun Gothic", sans-serif; }
    body { background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; }
    .header { padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .header h3 { margin: 0; font-size: 14px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .btn-close, .btn-save, .btn-delete, .btn-md, .btn-tomd, .btn-download, .btn-font, .btn-toggle-sidebar {
      padding: 8px 12px; border: none; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .btn-toggle-sidebar { background: #0f172a; color: #e2e8f0; }
    .btn-toggle-sidebar:hover { background: #1d4ed8; }
    .btn-close { background: #475569; color: #e2e8f0; }
    .btn-close:hover { background: #64748b; }
    .workspace { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .sidebar { width: 72px; background: #111827; border-right: 1px solid #334155; transition: width 0.2s ease; overflow: hidden; display: flex; flex-direction: column; }
    body.sidebar-open .sidebar { width: 280px; }
    .sidebar-head { padding: 14px 12px 10px; border-bottom: 1px solid #334155; }
    .sidebar-title { font-size: 12px; font-weight: 800; }
    .sidebar-subtitle { margin-top: 4px; font-size: 10px; color: #94a3b8; display: none; }
    body.sidebar-open .sidebar-subtitle { display: block; }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar-empty { color: #94a3b8; font-size: 11px; line-height: 1.5; padding: 8px; }
    .sidebar-item { width: 100%; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; border-radius: 10px; padding: 10px; text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
    .sidebar-item:hover { border-color: #60a5fa; background: #243244; }
    .sidebar-item-num { font-size: 11px; font-weight: 800; color: #93c5fd; }
    .sidebar-item-preview { display: none; font-size: 11px; line-height: 1.5; color: #cbd5e1; }
    body.sidebar-open .sidebar-item-preview { display: block; }
    .content { flex: 1; padding: 16px; overflow-y: auto; min-height: 0; }
    .content-empty { color: #94a3b8; font-size: 12px; }
    .scrap-item { margin-bottom: 12px; padding: 12px; background: #1e293b; color: #e2e8f0; border-radius: 10px; border: 1px solid #334155; scroll-margin-top: 18px; }
    .scrap-item-header { display: flex; gap: 8px; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .scrap-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; }
    .scrap-meta { color: #94a3b8; font-size: 10px; font-weight: 600; }
    .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-save { background: #2563eb; color: #fff; }
    .btn-save:hover { background: #1d4ed8; }
    .btn-delete { background: #475569; color: #e2e8f0; }
    .btn-delete:hover { background: #dc2626; color: #fff; }
    .btn-md { background: #0ea5e9; color: #fff; }
    .btn-md:hover { background: #0284c7; }
    .btn-font { background: #334155; color: #e2e8f0; padding: 8px 10px; min-width: 40px; }
    .btn-font:hover { background: #475569; }
    .scrap-item .item-body {
      min-height: 120px;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0b1220;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      font-size: 12px;
      outline: none;
    }
    .scrap-item .item-body[contenteditable="true"] { box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.25); }
    .scrap-item .item-body.preview { background: #f8fafc; color: #0f172a; }
    .scrap-item .item-body.preview table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .scrap-item .item-body.preview th, .scrap-item .item-body.preview td { border: 1px solid #cbd5e1; padding: 6px 8px; }
    .scrap-item .item-body.preview blockquote { margin: 10px 0; padding-left: 10px; border-left: 4px solid #0ea5e9; color: #334155; }
    .footer { padding: 12px 16px; border-top: 1px solid #334155; display: flex; gap: 8px; flex-shrink: 0; }
    .footer button { flex: 1; color: #fff; }
    .btn-download { background: #334155; }
    .btn-download:hover { background: #475569; }
    .btn-tomd { background: #ea580c; }
    .btn-tomd:hover { background: #c2410c; }
    .msg-toast { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); padding: 8px 16px; border-radius: 999px; font-size: 11px; font-weight: 600; z-index: 200; background: #1e293b; color: #e2e8f0; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .msg-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <h3>스크랩 누적 View Tools</h3>
    <div class="header-actions">
      <button class="btn-toggle-sidebar" id="btnToggleSidebar">목차 보기</button>
      <button class="btn-close" id="btnClose">X</button>
    </div>
  </div>
  <div class="workspace">
    <aside class="sidebar" id="accumulated-sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">스크랩 목차</div>
        <div class="sidebar-subtitle" id="sidebar-count">0개 항목</div>
      </div>
      <div class="sidebar-list" id="accumulated-outline">
        <div class="sidebar-empty">저장된 스크랩이 없습니다.</div>
      </div>
    </aside>
    <div class="content" id="accumulated-display">저장된 스크랩이 없습니다.</div>
  </div>
  <div class="footer">
    <button class="btn-download" id="btnSaveTxt">TXT Save</button>
    <button class="btn-download" id="btnSaveMd">MD Save</button>
    <button class="btn-tomd" id="btnToMD">ToMD Export</button>
  </div>
  <div id="message-box" class="msg-toast">MSG</div>
  <script src="../confirm/confirm.js"></script>
  <script src="./view-accumulated.js"></script>
</body>
</html>
