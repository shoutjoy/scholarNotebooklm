<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NotebookLM - Conversation Save View Tools</title>
  <script src="../md_editor/lib/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: "Segoe UI", "Malgun Gothic", sans-serif; }
    body { background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; }
    .header { padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .header h3 { margin: 0; font-size: 14px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .btn-close, .btn-save, .btn-delete, .btn-md, .btn-tomd, .btn-download, .btn-font, .btn-toggle-sidebar { padding: 8px 12px; border: none; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
    .btn-toggle-sidebar { background: #0f172a; color: #e2e8f0; }
    .btn-toggle-sidebar:hover { background: #1d4ed8; }
    .btn-close { background: #475569; color: #e2e8f0; }
    .btn-close:hover { background: #64748b; }
    .workspace { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .sidebar { width: 72px; background: #111827; border-right: 1px solid #334155; transition: width 0.2s ease; overflow: hidden; display: flex; flex-direction: column; }
    body.sidebar-open .sidebar { width: 300px; }
    .sidebar-head { padding: 14px 12px 10px; border-bottom: 1px solid #334155; }
    .sidebar-title { font-size: 12px; font-weight: 800; }
    .sidebar-subtitle { margin-top: 4px; font-size: 10px; color: #94a3b8; display: none; }
    body.sidebar-open .sidebar-subtitle { display: block; }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar-empty { color: #94a3b8; font-size: 11px; line-height: 1.5; padding: 8px; }
    .sidebar-item { width: 100%; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; border-radius: 10px; padding: 10px; text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
    .sidebar-item:hover { border-color: #60a5fa; background: #243244; }
    .sidebar-item-num { font-size: 11px; font-weight: 800; color: #93c5fd; }
    .sidebar-item-preview { display: none; font-size: 11px; line-height: 1.5; color: #cbd5e1; }
    body.sidebar-open .sidebar-item-preview { display: block; }
    .content { flex: 1; padding: 16px; overflow-y: auto; min-height: 0; }
    .content-empty { color: #94a3b8; font-size: 12px; }
    .conversation-item { margin-bottom: 12px; padding: 12px; background: #1e293b; color: #e2e8f0; border-radius: 10px; border: 1px solid #334155; scroll-margin-top: 18px; }
    .conversation-item-header { display: flex; gap: 8px; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .conversation-title { display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: 700; }
    .conversation-main-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .conversation-stats { color: #93c5fd; font-size: 10px; font-weight: 700; }
    .conversation-meta { color: #94a3b8; font-size: 10px; font-weight: 600; }
    .header-actions-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-save { background: #2563eb; color: #fff; }
    .btn-save:hover { background: #1d4ed8; }
    .btn-delete { background: #475569; color: #e2e8f0; }
    .btn-delete:hover { background: #dc2626; color: #fff; }
    .btn-md { background: #0ea5e9; color: #fff; }
    .btn-md:hover { background: #0284c7; }
    .btn-font { background: #334155; color: #e2e8f0; padding: 8px 10px; min-width: 40px; }
    .btn-font:hover { background: #475569; }
    .conversation-item .item-body { min-height: 120px; padding: 10px 12px; border: 1px solid #334155; border-radius: 8px; background: #0b1220; overflow: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.7; font-size: 12px; outline: none; }
    .conversation-item .item-body[contenteditable="true"] { box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.25); }
    .conversation-item .item-body.preview { background: #f8fafc; color: #0f172a; }
    .conversation-item .item-body.preview table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .conversation-item .item-body.preview th, .conversation-item .item-body.preview td { border: 1px solid #cbd5e1; padding: 6px 8px; }
    .conversation-item .item-body.preview blockquote { margin: 10px 0; padding-left: 10px; border-left: 4px solid #0ea5e9; color: #334155; }
    .conversation-item .item-body.conversation-view { padding: 14px; background: #08111f; white-space: normal; }
    .conversation-thread { display: flex; flex-direction: column; gap: 12px; }
    .conversation-separator { height: 1px; background: linear-gradient(90deg, transparent, #334155 18%, #475569 50%, #334155 82%, transparent); opacity: 0.9; }
    .conversation-entry { display: grid; grid-template-columns: 88px minmax(0, 1fr); gap: 12px; align-items: start; }
    .conversation-role { padding: 8px 10px; border-radius: 999px; background: #1e293b; color: #bfdbfe; text-align: center; font-size: 11px; font-weight: 800; letter-spacing: 0.02em; border: 1px solid #334155; position: sticky; top: 0; }
    .conversation-role.role-user { background: #1d4ed8; border-color: #2563eb; color: #eff6ff; }
    .conversation-role.role-assistant { background: #7c3aed; border-color: #8b5cf6; color: #f5f3ff; }
    .conversation-role.role-system { background: #0f766e; border-color: #14b8a6; color: #ecfeff; }
    .conversation-role.role-conversation { background: #334155; border-color: #475569; color: #e2e8f0; }
    .conversation-bubble { padding: 12px 14px; border-radius: 12px; border: 1px solid #1e293b; background: #0f172a; color: #e2e8f0; box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03); }
    .conversation-bubble p { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .conversation-bubble p + p { margin-top: 10px; }
    .conversation-item .item-body.conversation-view .conversation-entry:first-child .conversation-bubble { border-top-left-radius: 6px; }
    .footer { padding: 12px 16px; border-top: 1px solid #334155; display: flex; gap: 8px; flex-shrink: 0; }
    .footer button { flex: 1; color: #fff; }
    .btn-download { background: #334155; }
    .btn-download:hover { background: #475569; }
    .btn-tomd { background: #ea580c; }
    .btn-tomd:hover { background: #c2410c; }
    .msg-toast { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); padding: 8px 16px; border-radius: 999px; font-size: 11px; font-weight: 600; z-index: 200; background: #1e293b; color: #e2e8f0; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .msg-toast.show { opacity: 1; }
    @media (max-width: 720px) {
      .conversation-entry { grid-template-columns: 1fr; gap: 8px; }
      .conversation-role { position: static; justify-self: start; min-width: 88px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>Conversation Save View Tools</h3>
    <div class="header-actions">
      <button class="btn-toggle-sidebar" id="btnToggleSidebar">Show Outline</button>
      <button class="btn-close" id="btnClose">X</button>
    </div>
  </div>
  <div class="workspace">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">Conversation Outline</div>
        <div class="sidebar-subtitle" id="sidebar-count">0 items</div>
      </div>
      <div class="sidebar-list" id="conversation-outline">
        <div class="sidebar-empty">No saved conversations.</div>
      </div>
    </aside>
    <div class="content" id="conversation-display">No saved conversations.</div>
  </div>
  <div class="footer">
    <button class="btn-download" id="btnSaveTxt">TXT Save</button>
    <button class="btn-download" id="btnSaveMd">MD Save</button>
    <button class="btn-tomd" id="btnToMD">ToMD Export</button>
  </div>
  <div id="message-box" class="msg-toast">MSG</div>
  <script src="../confirm/confirm.js"></script>
  <script src="./view-conversations.js"></script>
</body>
</html>
